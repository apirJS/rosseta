name: Publish to Firefox Add-ons

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.2.1). Leave empty for latest.'
        required: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Sign & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | jq -r '.tag_name')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Firefox zip from release
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          version: tags/${{ steps.version.outputs.tag }}
          file: firefox-${{ steps.version.outputs.tag }}.zip
          target: firefox.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unzip for web-ext
        run: |
          mkdir -p dist/firefox
          unzip firefox.zip -d dist/firefox

      - name: Sign with AMO
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir dist/firefox \
            --channel listed \
            --approval-timeout 0 \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"
